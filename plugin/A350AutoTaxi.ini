# A350AutoTaxi.ini - GSX-style ground routing version
# Lines beginning with # are comments.

# Optional. If empty, plugin picks the nearest usable airport using current aircraft position.
# Setting ICAO is faster and safer for large custom scenery libraries.
icao=

# Optional absolute or X-Plane-root-relative path to one apt.dat.
# If empty, scan order is:
#   1) this explicit apt_dat_path, if set
#   2) enabled Custom Scenery entries from scenery_packs.ini, top to bottom
#   3) Custom Scenery/Global Airports/Earth nav data/apt.dat
#   4) Resources/default scenery/default apt dat/Earth nav data/apt.dat
apt_dat_path=

# Optional legacy destination override. UI dropdown normally supersedes these.
destination_node=
destination_ramp=
destination_lat=
destination_lon=

# A350 aircraft guard. A359 = A350-900, A35K = A350-1000.
# Set allow_any_aircraft=true only for bench testing.
allow_any_aircraft=false
allowed_aircraft_icao=A359,A35K,A350

# Airport search and scenery-priority resolving.
airport_search_radius_nm=8.0
same_airport_priority_tolerance_m=700.0

# Taxi controller tuning for A350. Units: knots/metres/degrees.
taxi_speed_kts=25.0
slow_speed_kts=5.0
final_speed_kts=3.0
sharp_turn_speed_kts=4.0
waypoint_radius_m=18.0
final_stop_radius_m=10.0

# Arrival anti-circling guard. Some runway hold-short endpoints in apt.dat are
# tiny/sharp terminal hooks; forcing exact node capture there makes the aircraft orbit.
# This stops inside a realistic arrival bubble and prunes tiny final hooks when planning.
terminal_arrival_guard=true
terminal_arrival_radius_m=34.0
terminal_overshoot_radius_m=55.0
terminal_overshoot_seconds=0.8
terminal_no_tight_turn_distance_m=85.0
terminal_slowdown_distance_m=130.0
terminal_speed_kts=2.0
terminal_min_final_leg_m=28.0
terminal_sharp_turn_deg=95.0
terminal_sharp_turn_short_leg_m=55.0
terminal_xte_stop_m=16.0

lookahead_distance_m=80.0
lookahead_min_distance_m=35.0
lookahead_max_distance_m=135.0
lookahead_speed_gain_m_per_kt=3.0
turn_slowdown_threshold_deg=30.0

# AP-like PID route capture. The controller follows the fixed planned polyline,
# not the nearest node, so it will not hunt +/- near a taxi node.
pid_route_tracking=true
pid_heading_kp=0.48
pid_heading_ki=0.000
pid_heading_kd=0.36
pid_integral_limit_deg_sec=45.0
pid_derivative_filter_sec=0.62
pid_cross_track_gain_deg_per_m=0.10
pid_cross_track_max_deg=10.0
max_track_capture_angle_deg=58.0

# Fast capture for startup/off-track recovery.
# This is why steer can now reach 1.00 during large low-speed corrections:
# capture mode temporarily uses 45 deg as full steering instead of the smooth 70 deg value.
fast_route_capture=true
fast_capture_start_seconds=28.0
fast_capture_threshold_m=5.5
fast_capture_hard_threshold_m=16.0
fast_capture_gain_deg_per_m=0.52
fast_capture_max_bias_deg=28.0
fast_capture_kp_boost=1.05
fast_capture_kd_boost=1.65
fast_capture_steer_full_deflection_deg=45.0
fast_capture_steer_smoothing_per_sec=2.20
near_route_damping_m=5.0

# Predictive XTE lead. This starts counter-steering before XTE actually crosses 0,
# whether the current XTE is positive or negative. Raise lead_time for earlier
# pre-turn, lower it if it starts weaving before the line.
predictive_xte_lead=true
predictive_xte_lead_time_sec=4.0
predictive_xte_max_lead_m=22.0
predictive_xte_rate_filter_sec=0.55
predictive_xte_min_active_m=0.8

# Micro-course anticipatory return steering. This uses aircraft heading vs. taxiway
# centerline to predict future XTE even when measured XTE is changing very slowly.
# It starts unwinding/counter-steering before XTE reaches zero, reducing small S-turns.
micro_anticipate_return=true
micro_anticipate_band_m=8.0
micro_anticipate_lead_sec=4.2
micro_anticipate_geom_rate_weight=0.90
micro_anticipate_min_speed_kts=1.0
micro_anticipate_min_heading_deg=0.5
micro_anticipate_max_lead_m=10.0
micro_anticipate_bias_boost=1.35
micro_anticipate_deadband_deg=0.20

# Direct pre-zero return steering. This is stronger than the predictive XTE bias:
# while still on one side of the route, if the tiller is steering toward the line,
# it starts blending the requested steer to the opposite side before XTE crosses 0.
micro_anticipate_direct_steer=true
micro_anticipate_direct_band_m=7.0
micro_anticipate_counter_steer_ratio=0.22
micro_anticipate_counter_min_ratio=0.06
micro_anticipate_toward_steer_threshold=0.010
micro_anticipate_direct_blend=0.80
micro_anticipate_pid_return_deg=9.0

# Direct track-course capture. This is the main fix for delayed centerline tracking:
# instead of waiting for the far look-ahead point to create enough heading error, the
# controller follows taxiway course + an immediate XTE intercept angle. Inside the
# prezero band it starts reducing/countering effective XTE before the displayed XTE
# crosses 0, so the tiller returns before crossing the taxiway centerline.
track_course_control=true
track_course_blend=0.92
track_course_lookahead_m=16.0
track_course_speed_gain_m_per_kt=0.55
track_course_gain=1.18
track_course_max_intercept_deg=26.0
track_course_prezero_band_m=11.0
track_course_prezero_lead_sec=5.6
track_course_prezero_power=2.30
track_course_prezero_min_heading_deg=0.10
track_course_prezero_counter_m=4.8
track_course_tight_turn_fade=1.00

# XTE corridor / anti-sway guard. First capture into +/-5m, then fine tune.
# This reduces aggressive yaw corrections and prevents repeated S-turns across the line.
xte_corridor_control=true
xte_corridor_m=5.0
xte_fine_tune_m=1.2
xte_corridor_outer_gain=0.55
xte_corridor_inner_gain=0.42
xte_corridor_max_intercept_deg=13.0
xte_corridor_outer_max_intercept_deg=22.0
xte_corridor_lead_sec=4.0
xte_corridor_prezero_return_deg=7.0
xte_corridor_kp_scale=0.52
xte_corridor_kd_boost=1.45
xte_corridor_capture_fade=0.18
sway_damping_band_m=6.0
sway_damping_command_scale=0.55
sway_damping_steer_rate_per_sec=2.0

# Early hard-turn takeover. This arms the one-pass/tight-turn program before the
# normal tight-turn window, so route track does not keep the aircraft straight
# until the intersection. Raise distance for even earlier full tiller; lower it if
# the aircraft cuts too much inside the corner.
early_turn_takeover=true
early_turn_takeover_angle_deg=50.0
early_turn_takeover_distance_m=240.0
early_turn_full_distance_m=170.0
early_turn_min_blend=0.55
early_turn_heading_blend=1.00
early_turn_track_course_fade=1.00
early_turn_snap_to_ratio=1.00
early_turn_snap_min_target_ratio=0.98

# Hard full-tiller snap for large turns. This bypasses slow rate build-up:
# when a 70-100 degree corner is within tight_turn_force_full_steer_distance_m,
# steering is forced instantly to +/-1.00 until rollout begins.
tight_turn_force_full_steer=true
tight_turn_force_full_steer_angle_deg=65.0
tight_turn_force_full_steer_distance_m=190.0
tight_turn_force_full_steer_ratio=1.00
tight_turn_force_full_release_heading_deg=24.0

# Start turning before the nose reaches a taxi node, then damp the capture.
turn_anticipation=true
turn_anticipation_distance_m=240.0
turn_anticipation_min_angle_deg=15.0
turn_anticipation_extra_lookahead_m=70.0
turn_anticipation_slowdown_kts=4.0

# Tight-radius cornering. This reduces the very wide arc in 90-degree taxiway turns:
# target point is kept just after the corner apex, speed is reduced, and full tiller/differential brake authority is allowed.
tight_turn_mode=true
tight_turn_angle_deg=25.0
tight_turn_trigger_distance_m=220.0
tight_turn_lookahead_after_apex_m=18.0
tight_turn_min_lookahead_m=14.0
tight_turn_speed_kts=3.0
tight_turn_steer_full_deflection_deg=10.0
tight_turn_steer_smoothing_per_sec=60.0
tight_turn_kp_boost=2.50
tight_turn_kd_boost=1.00
tight_turn_differential_brake_max=0.28
tight_turn_differential_brake_min_kts=0.5

# Faster tiller response in tight turns. This fixes the "steer is too slow" problem:
# when a corner is detected, the command can jump part-way and then rate-limit much faster.
steer_fast_response=true
steer_fast_response_error_deg=10.0
steer_fast_response_xte_m=2.5
steer_fast_response_rate_per_sec=60.0
tight_turn_snap_steer=true
tight_turn_snap_blend=0.0
tight_turn_snap_min_target_ratio=0.98
tight_turn_snap_to_ratio=1.00
# Aggressive one-pass 90-degree turn mode. It snaps hard into the turn, then rolls out before overshooting the outbound leg.
tight_turn_one_pass_mode=true
tight_turn_one_pass_angle_deg=70.0
tight_turn_hard_snap_to_ratio=1.00
tight_turn_hard_snap_min_target_ratio=0.98
tight_turn_rollout_heading_deg=24.0
tight_turn_rollout_gain=1.80
tight_turn_rollout_min_pid_deg=3.0

route_segment_advance_along=0.72
route_segment_scan_ahead=4

# Outputs. 0.11 was too weak for many heavy/custom A350 models.
# If the aircraft still does not roll, raise max_throttle to 0.40 temporarily, or use DataRefTool for custom A350 datarefs.
max_throttle=0.48
creep_throttle=0.18
breakaway_throttle=0.40
stuck_boost_seconds=2.0

# Dynamic throttle governor. The plugin now changes throttle continuously to hold
# target taxi speed, lowers thrust during tight turns/route capture, and adds thrust
# again when speed drops. Increase max_throttle/throttle_speed_kp if the A350 is heavy
# or does not start rolling; decrease throttle_trim if it creeps too fast.
dynamic_throttle_control=true
throttle_idle=0.035
throttle_trim=0.110
throttle_min_moving=0.070
throttle_speed_kp=0.055
throttle_capture_reduction=0.35
throttle_turn_reduction=0.60
throttle_terminal_reduction=0.60
throttle_increase_rate_per_sec=0.40
throttle_decrease_rate_per_sec=0.55
throttle_overspeed_brake_deadband_kts=0.6

command_assist=true
max_brake=0.65
brake_gain=0.22
# Lower and smoother steering for heavy A350 taxi turns.
# If it cannot make a tight stand turn, raise low_speed_max_steer_ratio to 0.48.
steer_full_deflection_deg=70.0
steer_deadband_deg=2.0
steer_smoothing_per_sec=3.50
max_steer_ratio=1.00
low_speed_max_steer_ratio=1.00
high_speed_max_steer_ratio=0.70
high_speed_steer_kts=10.0
steer_curve_exponent=1.00
differential_brake_threshold_deg=10.0
differential_brake_max=0.16

# ECAM F/CTL coupling during taxi turns.
# Steering remains the main control; rudder/roll follow the turn, with more authority than before.
fctl_turn_coupling=true
fctl_rudder_gain=0.45
fctl_roll_gain=0.28
fctl_max_ratio=0.35

# Optional SLATS/FLAPS assist shown on the ECAM F/CTL page.
# This is secondary only; it will not replace nosewheel steering. Third-party A350s may ignore
# these default datarefs unless you map them with DataRefTool.
fctl_secondary_assist=true
fctl_secondary_min_tight_blend=0.20
fctl_secondary_flap_ratio=0.16
fctl_secondary_restore_on_release=true

# Runway destination line-up. When destination is a runway, the controller uses apt.dat
# runway endpoints to align both runway heading and runway centerline before arrival.
runway_alignment_mode=true
runway_align_capture_distance_m=420.0
runway_align_full_distance_m=260.0
runway_align_center_gain_deg_per_m=0.85
runway_align_max_intercept_deg=34.0
runway_align_speed_kts=8.0
runway_align_center_tolerance_m=4.0
runway_align_heading_tolerance_deg=6.0

# Routing and safety.
avoid_runway_edges=true
runway_penalty_m=5000.0
active_zone_penalty_m=2000.0
turn_penalty_m=35.0
auto_replan_if_off_route=true
off_route_replan_distance_m=90.0
max_start_node_distance_m=180.0
max_start_speed_kts=8.0
gate_position_radius_m=140.0
taxiway_position_radius_m=65.0
hold_parking_brake_at_destination=true
route_summary_max_names=12

# Datarefs. Change these for a third-party A350 if DataRefTool shows different writable controls.
steer_dataref=sim/cockpit2/controls/yoke_heading_ratio
fctl_rudder_dataref=sim/cockpit2/controls/yoke_heading_ratio
fctl_roll_dataref=sim/cockpit2/controls/yoke_roll_ratio
fctl_rudder_legacy_dataref=sim/joystick/yoke_heading_ratio
fctl_roll_legacy_dataref=sim/joystick/yoke_roll_ratio
fctl_flap_ratio_dataref=sim/cockpit2/controls/flap_ratio
fctl_flap_request_dataref=sim/flightmodel/controls/flaprqst
fctl_slat_ratio_dataref=sim/flightmodel/controls/slatrat
throttle_all_dataref=sim/cockpit2/engine/actuators/throttle_ratio_all
throttle_array_dataref=sim/cockpit2/engine/actuators/throttle_ratio
left_brake_dataref=sim/flightmodel/controls/l_brake_add
right_brake_dataref=sim/flightmodel/controls/r_brake_add
parking_brake_dataref=sim/cockpit2/controls/parking_brake_ratio
